name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: make format-check

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Test + coverage
        run: make test

      - name: Coverage report
        run: make coverage

      - name: Build examples
        run: make examples
