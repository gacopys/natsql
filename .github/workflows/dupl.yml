name: Code Duplication

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  dupl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run make dupl
        run: make dupl
